<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Challan Auto Download</title>
</head>
<body>
    <script>
        function getUrlVars() {
            var vars = {}, hash;
            var hashes = window.location.href.slice(window.location.href.indexOf('?') + 1).split('&');
            for(var i = 0; i < hashes.length; i++) {
                hash = hashes[i].split('=');
                vars[hash[0]] = hash[1];
            }
            return vars;
        }

        window.onload = function() {
            var params = getUrlVars();
            var filename = params["file"];   // ?file=yourfile.pdf
            
            if (filename) {
                var downloadUrl = 'https://challanverification.github.io/challan/' + filename;
                
                var link = document.createElement('a');
                link.href = downloadUrl;
                link.download = filename;   // ফাইল নাম
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                document.body.innerHTML = '<h2 style="text-align:center; margin-top:50px; font-family:Arial;">ডাউনলোড শুরু হচ্ছে...<br>ফাইল: ' + filename + '</h2>';
            } else {
                document.body.innerHTML = '<h2 style="text-align:center; margin-top:50px; color:red; font-family:Arial;">ফাইলের নাম দিন। উদাহরণ: ?file=2425-0033588820.pdf</h2>';
            }
        };
    </script>
</body>
</html>
